version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      # 支持多平台构建（AMD64和ARM64）
      platforms:
        - "linux/amd64"
        - "linux/arm64"
    image: nondiff-rl-backend:latest
    container_name: nondiff-rl-backend
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - LOG_LEVEL=INFO
      - DEBUG=false
    volumes:
      - ./backend/models:/app/models
      - ./backend/logs:/app/logs
      - ./backend/plots:/app/plots
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

networks:
  default:
    name: nondiff-rl-network
