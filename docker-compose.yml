services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: nondiff-rl-backend:latest
    container_name: nondiff-rl-backend
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8
      - LOG_LEVEL=INFO
      - DEBUG=false
    volumes:
      - ./backend/models:/app/models
      - ./backend/logs:/app/logs
      - ./backend/plots:/app/plots
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

networks:
  default:
    name: nondiff-rl-network
